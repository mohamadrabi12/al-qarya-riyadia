<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle - blue gradient -->
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
  </defs>

  <!-- Outer ring gold -->
  <circle cx="32" cy="32" r="31" fill="#ffd700"/>
  <!-- Inner circle blue -->
  <circle cx="32" cy="32" r="27" fill="url(#bg)"/>

  <!-- Soccer ball -->
  <circle cx="32" cy="32" r="14" fill="white" stroke="#333" stroke-width="1"/>
  <!-- Pentagon center -->
  <polygon points="32,20 38,25 36,32 28,32 26,25" fill="#1a1a1a"/>
  <!-- Side pentagons -->
  <polygon points="18,27 24,24 26,31 21,35 16,32" fill="#1a1a1a"/>
  <polygon points="46,27 40,24 38,31 43,35 48,32" fill="#1a1a1a"/>
  <polygon points="26,42 28,36 36,36 38,42 32,46" fill="#1a1a1a"/>
</svg>
